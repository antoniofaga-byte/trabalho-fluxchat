<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>chat</title>
</head>
<style>
    body{
        background-color: rgb(0, 208, 174);
         height: 100vh;
          font-family:
           sans-serif;
            display:
             flex;
              overflow:
               hidden;
    }
    * {
         margin: 0; 
         padding: 0;
          box-sizing:
           border-box;
     }
        .sidebar {
            width: 30%; 
            min-width: 250px;
            background-color: #ffffff;
            border-right: 1px solid #ddd;
            display: flex;
            flex-direction: column;
        }

        
        .direita{
            background-color: #ededed;
            padding: 15px;
            font-weight: bold;
            border-bottom: 1px solid #ddd;
        }

       
        .Quadro {
            padding: 10px;
            background-color: #f6f6f6;
        }
        .Quadro input {
            width: 100%;
            padding: 8px;
            border: none;
            border-radius: 5px;
        }
        .Lista {
            overflow-y: auto;
            flex: 1;
        }
        .contact {
            padding: 15px;
            border-bottom: 1px solid #eee;
            display: flex;
            align-items: center;
            cursor: pointer;
        }
        .contact:hover {
             background-color: #f5f5f5;
         }
        .contatos {
            width: 40px; height: 40px;
            background-color: #ccc;
            border-radius: 50%;
            margin-right: 15px;
        }  
        .chat-area {
            flex: 1; 
            background-color: #e5ddd5; 
            display: flex;
            justify-content: center;
            align-items: center;
            color: #007b34;
        }
</style>

<body>
    <center><h2><b class="FluxChat">FluxChat</b></h2></center> 
    <center><a href="aluno.html"><button>Deslogar</button></a></center>
    
<body>
    <div class="sidebar">
        <div class="direita">Conversas</div>
        <div class="Quadro">
            <input type="text" placeholder="Pesquisar ou começar uma nova conversa">
        </div>
        <div class="Lista">
            <div class="contact"><div class="contatos"></div><div>João Silva</div></div>
            <div class="contact"><div class="contatos"></div><div>Maria Souza</div></div>
            <div class="contact"><div class="contatos"></div><div>Grupo Devs</div></div>
        </div>
    </div>

 
    <div class="chat-area">
        <h1>Selecione uma conversa</h1>
    </div>


    
</body>
</html>
