<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>chat</title>
</head>
<style>
    body{
        background-color: rgb(0, 208, 174);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
        body { height: 100vh; font-family: sans-serif; display: flex; overflow: hidden; }

        /* Painel Esquerdo - Lista de Contatos */
        .sidebar {
            width: 30%; /* Largura da parte dos contatos */
            min-width: 250px;
            background-color: #ffffff;
            border-right: 1px solid #ddd;
            display: flex;
            flex-direction: column;
        }

        /* Topo do painel esquerdo */
        .sidebar-header {
            background-color: #ededed;
            padding: 15px;
            font-weight: bold;
            border-bottom: 1px solid #ddd;
        }

        /* Barra de pesquisa */
        .search-box {
            padding: 10px;
            background-color: #f6f6f6;
        }
        .search-box input {
            width: 100%;
            padding: 8px;
            border: none;
            border-radius: 5px;
        }

        /* Lista de conversas */
        .contact-list {
            overflow-y: auto;
            flex: 1;
        }
        .contact {
            padding: 15px;
            border-bottom: 1px solid #eee;
            display: flex;
            align-items: center;
            cursor: pointer;
        }
        .contact:hover { background-color: #f5f5f5; }
        .contact-avatar {
            width: 40px; height: 40px;
            background-color: #ccc;
            border-radius: 50%;
            margin-right: 15px;
        }

        /* Painel Direito - Chat */
        .chat-area {
            flex: 1; /* Ocupa o restante da tela */
            background-color: #e5ddd5; /* Cor de fundo do chat */
            display: flex;
            justify-content: center;
            align-items: center;
            color: #555;
        }
</style>

<body>
    <center><h2><b class="FluxChat">FluxChat</b></h2></center>
    
<body>

    <!-- Painel da Esquerda (WhatsApp style) -->
    <div class="sidebar">
        <div class="sidebar-header">Conversas</div>
        <div class="search-box">
            <input type="text" placeholder="Pesquisar ou começar uma nova conversa">
        </div>
        <div class="contact-list">
            <div class="contact"><div class="contact-avatar"></div><div>João Silva</div></div>
            <div class="contact"><div class="contact-avatar"></div><div>Maria Souza</div></div>
            <div class="contact"><div class="contact-avatar"></div><div>Grupo Devs</div></div>
        </div>
    </div>

    <!-- Painel da Direita (Conteúdo) -->
    <div class="chat-area">
        <h1>Selecione uma conversa</h1>
    </div>


    
</body>
</html>
