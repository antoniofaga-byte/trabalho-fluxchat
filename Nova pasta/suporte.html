<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Suporte FluxChat</title> 
</head>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .suporte {
            background-color: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 400px;
            width: 90%;
        }
        .suporte h2 {
            color: #25D366;
            margin-bottom: 10px;
        }
        .suporte p {
            color: #555;
            margin-bottom: 30px;
        }
        .chat {
            background-color: #08d2c8;
            color: white;
            padding: 15px 25px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: bold;
            display: inline-flex;
            align-items: center;
            transition:0.3s;
        }
        .chat:hover {
            background-color: #128C7E;
        }
        .icon {
            margin-right: 10px;
        }
    </style>

<body>

    <div class="suporte">
        <h2>Fale com o Suporte</h2>
        <p>Precisa de ajuda? Clique no botão abaixo e converse com nossa equipe pelo Fluxchat.</p>
        <a href="aluno.html" 
           target="_blank" class="chat">
            <span class="icon">💬</span> Chamar no Fluxchat
        </a>
    
</body>
</html>
